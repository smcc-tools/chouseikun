name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は最新のみ（古いデプロイはキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # テストが通らない限りデプロイしない
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: フロント特性化テスト（index.html から抽出）
        run: node --test tests/frontend/*.test.js

      - name: Functions テスト（venueBrief）
        run: |
          cd functions
          npm ci
          npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # サイトに必要なファイルだけを _site にステージング（functions/scripts等は除外）
      - name: Stage site files
        run: |
          mkdir -p _site
          cp -r index.html sw.js manifest.json .nojekyll icons test _site/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
